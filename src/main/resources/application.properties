spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.SQLServerDialect
# Changed to 'none' to completely disable DDL operations
# Production tables already exist and should not be modified by Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.hbm2ddl.auto=none
# Completely disable schema generation to prevent any DDL operations
spring.jpa.properties.jakarta.persistence.schema-generation.database.action=none
spring.jpa.properties.jakarta.persistence.schema-generation.scripts.action=none

application.jwt.secretKey=securesecuresecuresecuresecuresecure
application.jwt.tokenPrefix=Bearer 
application.jwt.tokenExpirationAfterDays=1



spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=60000

# Redis Configuration (Optional - only used if Redis is available)
# Comment out or leave empty to disable Redis caching
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# Cache Configuration (Optional - defaults to simple cache if Redis not available)
# Set to 'none' to disable caching completely, or 'simple' for in-memory cache
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.cache.cache-names=products,productCount
